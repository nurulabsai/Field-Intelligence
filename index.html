<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuruOS: Field Intelligence</title>
    <meta name="description" content="Smarter Field Audits. Powered by AI. Professional field audit application by Nuru Labs.">
    <meta name="theme-color" content="#0B0F19">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', 'Inter', sans-serif;
            background: #0B0F19;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
        }
        /* Inline splash for instant paint while JS loads */
        #splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #111622 0%, #0B0F19 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(190, 242, 100, 0.2);
            border-bottom-color: #BEF264;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="splash">
        <div class="loader"></div>
        <h1 style="margin-top: 16px; font-size: 20px; font-weight: 700; color: white; letter-spacing: 0.05em;">NuruOS</h1>
        <p style="font-size: 14px; color: #6B7280;">Field Intelligence</p>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
        // Remove HTML splash once React mounts
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                if (splash) {
                    splash.style.opacity = '0';
                    splash.style.pointerEvents = 'none';
                    setTimeout(() => splash.remove(), 300);
                }
            }, 800);
        });
    </script>
</body>
</html>
