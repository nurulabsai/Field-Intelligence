<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #2C1810;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        h1 { font-size: 32px; margin-bottom: 10px; }
        p { color: #C4956C; }
        button {
            margin-top: 20px;
            padding: 15px 30px;
            background: #3D7C45;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Browser Test</h1>
        <p>If you can see this, your browser is working correctly.</p>
        <button onclick="alert('Button works!')">Click Me</button>
    </div>
</body>
</html>
