<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NuruOS Welcome Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;700&amp;family=Manrope:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        'neon-lime': '#BEF264',
                        'neon-cyan': '#67E8F9',
                        'bg-deep': '#0B0F19',
                        'charcoal': '#1A1D23',
                    },
                    fontFamily: {
                        sora: ['Sora', 'sans-serif'],
                        manrope: ['Manrope', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft-lime': '0 20px 40px -12px rgba(190, 242, 100, 0.25)',
                        'glow-logo': '0 0 40px rgba(190, 242, 100, 0.12)',
                        'glow-cyan-subtle': '0 0 15px rgba(103, 232, 249, 0.1)',
                    }
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        :root {
            --bg-deep: #0B0F19;
            --neon-lime: #BEF264;
            --neon-cyan: #67E8F9;
        }
        body {
            background-color: var(--bg-deep);
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .text-glow-lime {
            text-shadow: 0 0 12px rgba(190, 242, 100, 0.5);
        }
        .glass-dark-cyan {
            background: rgba(11, 15, 25, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(103, 232, 249, 0.3);
        }
        .logo-glow-filter {
            filter: drop-shadow(0 0 10px rgba(190, 242, 100, 0.3));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-manrope text-white flex flex-col items-center justify-between relative antialiased bg-[#0B0F19]">
<div class="absolute inset-0 z-0 bg-grid-pattern pointer-events-none"></div>
<div class="absolute top-[-15%] left-[-15%] w-[80%] h-[60%] bg-neon-lime/5 blur-[140px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-[-15%] right-[-15%] w-[80%] h-[60%] bg-neon-cyan/5 blur-[140px] rounded-full pointer-events-none"></div>
<div class="flex-1 flex flex-col items-center justify-center w-full px-10 relative z-10 pt-20">
<div class="mb-16 relative">
<div class="w-28 h-28 bg-[#111622] rounded-[32px] flex items-center justify-center relative z-10 border border-white/5 shadow-glow-logo">
<div class="relative w-16 h-16 flex items-center justify-center border border-white/10 rounded-full logo-glow-filter">
<svg class="w-10 h-10" fill="none" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<path d="M22 20C22 18.8954 22.8954 18 24 18H34C35.1046 18 36 18.8954 36 20V80C36 81.1046 35.1046 82 34 82H24C22.8954 82 22 81.1046 22 80V20Z" fill="white"></path>
<path d="M64 20C64 18.8954 64.8954 18 66 18H76C77.1046 18 78 18.8954 78 20V80C78 81.1046 77.1046 82 76 82H66C64.8954 82 64 81.1046 64 80V20Z" fill="white"></path>
<path d="M30 25L70 75L76 70L36 20L30 25Z" fill="white"></path>
</svg>
</div>
</div>
<div class="absolute inset-0 bg-neon-lime/5 rounded-[32px] blur-2xl -z-10 translate-y-2"></div>
</div>
<h1 class="text-[44px] font-sora font-light tracking-tight mb-6 text-center leading-none">
            Nuru<span class="text-neon-lime text-glow-lime">OS</span>
</h1>
<p class="text-white text-center text-[18px] font-manrope font-medium leading-relaxed max-w-[280px]">
            Smarter Field Audits.<br/>
<span class="opacity-60 font-normal">Powered by AI.</span>
</p>
</div>
<div class="w-full px-10 pb-20 z-10 flex flex-col gap-5 max-w-md">
<button class="w-full bg-[#BEF264] text-[#0B0F19] h-[68px] rounded-full font-bold text-[15px] shadow-soft-lime active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3 tracking-[0.08em]">
            GET STARTED
            <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<button class="w-full glass-dark-cyan text-white h-[68px] rounded-full font-semibold text-[15px] shadow-glow-cyan-subtle active:scale-[0.98] transition-all duration-200 tracking-[0.08em]">
            SIGN IN
        </button>
<div class="flex justify-center mt-10">
<div class="w-32 h-1.5 bg-white/10 rounded-full"></div>
</div>
</div>

</body></html>
