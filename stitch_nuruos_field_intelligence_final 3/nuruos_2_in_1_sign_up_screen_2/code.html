<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vital Aesthetic Harmonized Sign Up Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --bg-deep: #0B0F19;
            --neon-lime: #BEF264;
            --neon-cyan: #67E8F9;
            --glass-slate: rgba(15, 23, 42, 0.5);
        }
        body {
            background-color: var(--bg-deep);
            font-family: 'Manrope', sans-serif;
            min-height: 100dvh;
        }
        .font-sora {
            font-family: 'Sora', sans-serif;
        }
        .glass-card {
            background: var(--glass-slate);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .input-glow:focus {
            box-shadow: 0 0 15px rgba(103, 232, 249, 0.15);
            border-color: var(--neon-cyan);
        }
        .social-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }
        .social-btn:active {
            border-color: var(--neon-cyan);
            background: rgba(103, 232, 249, 0.05);
        }
    </style>
<style>
        body {
            min-height: max(932px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-white overflow-hidden flex flex-col items-center">
<div class="w-full pt-14 pb-10 px-8 flex flex-col relative z-10 shrink-0 max-w-md">
<button class="w-12 h-12 bg-white/5 border border-white/10 backdrop-blur-md rounded-full flex items-center justify-center text-white mb-8 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[22px]">arrow_back_ios_new</span>
</button>
<h1 class="text-4xl font-light tracking-tight text-white mb-3 font-sora">Create an Account</h1>
<p class="text-gray-400 text-base font-medium font-manrope">Sign up to access NuruOS Field Intelligence tools.</p>
</div>
<div class="flex-1 w-full glass-card relative rounded-t-[32px] overflow-hidden flex flex-col max-w-md">
<div class="h-full overflow-y-auto no-scrollbar flex-1">
<div class="p-8 pb-12">
<div class="bg-black/40 p-1.5 rounded-full flex mb-10 border border-white/5">
<button class="flex-1 py-3.5 text-sm font-semibold text-gray-400 hover:text-white transition-colors font-manrope">
                        Sign In
                    </button>
<button class="flex-1 py-3.5 text-sm font-bold text-black bg-[var(--neon-lime)] rounded-full transition-all shadow-lg shadow-[#BEF264]/10 font-manrope">
                        Sign Up
                    </button>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2.5">
<label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] ml-2 font-manrope">First Name</label>
<input class="w-full px-5 py-4 rounded-[16px] bg-black/40 border border-white/10 outline-none text-white placeholder-gray-600 transition-all text-sm input-glow font-manrope" placeholder="Jonathan" type="text"/>
</div>
<div class="space-y-2.5">
<label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] ml-2 font-manrope">Last Name</label>
<input class="w-full px-5 py-4 rounded-[16px] bg-black/40 border border-white/10 outline-none text-white placeholder-gray-600 transition-all text-sm input-glow font-manrope" placeholder="Smith" type="text"/>
</div>
</div>
<div class="space-y-2.5">
<label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] ml-2 font-manrope">Email</label>
<input class="w-full px-5 py-4 rounded-[16px] bg-black/40 border border-white/10 outline-none text-white placeholder-gray-600 transition-all text-sm input-glow font-manrope" placeholder="jonathansmith76@gmail.com" type="email"/>
</div>
<div class="space-y-2.5">
<label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] ml-2 font-manrope">Password</label>
<div class="relative">
<input class="w-full px-5 py-4 rounded-[16px] bg-black/40 border border-white/10 outline-none text-white placeholder-gray-600 transition-all text-sm pr-14 input-glow font-manrope" type="password" value="Password123"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-[var(--neon-cyan)] transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<div class="space-y-2.5">
<label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] ml-2 font-manrope">Confirm Password</label>
<div class="relative">
<input class="w-full px-5 py-4 rounded-[16px] bg-black/40 border border-white/10 outline-none text-white placeholder-gray-600 transition-all text-sm pr-14 input-glow font-manrope" placeholder="Re-enter password" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-[var(--neon-cyan)] transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<div class="pt-6">
<button class="w-full bg-[var(--neon-lime)] text-black py-4.5 rounded-full font-bold text-base shadow-xl shadow-[#BEF264]/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 h-14" type="submit">
                            REGISTER
                            <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/5"></div>
</div>
<div class="relative flex justify-center text-[10px] uppercase tracking-[0.2em]">
<span class="px-4 bg-[#0F172A]/80 backdrop-blur-md rounded-full text-gray-500 font-bold font-manrope">Or Register With</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4 pb-6">
<button class="social-btn rounded-full flex items-center justify-center gap-3 px-4 py-4 transition-all group h-14" type="button">
<img alt="Google" class="w-5 h-5 brightness-200 contrast-0 grayscale invert opacity-80 group-hover:opacity-100" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3gy83Z5l95Hx3VoJyR6Ml1GhmMqFceTfJKT4J8ahmV3BUF-bQtY_6bw60FIyv4ogEXzvBTLUa_cAoiTmaYfMd8a9SE79UiQuweGp1l5VbmyUfOBDUHG7vftLGcYTrCkgfGfAj9HzgM5ynXVCDpSE0MLz0-za0Wo8uSk7XJrdRB9c43kuVulXUSnkwr8lLDj0q6B6pkPYj5rQ2PQwKsQgZxs73Rd5hJIYSFn-JRydfOjv7lZRQAhIbR5yEQ9Gmvp53kLA6PNnVn5hy"/>
<span class="text-sm font-bold text-gray-400 group-hover:text-white font-manrope">Google</span>
</button>
<button class="social-btn rounded-full flex items-center justify-center gap-3 px-4 py-4 transition-all group h-14" type="button">
<img alt="Apple" class="w-5 h-5 invert opacity-80 group-hover:opacity-100" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEjRfPsOB2H-lLvnqktujGjk6-z0grVqKvRqBzp77VxP8Ot9grBDu9FDuizQNBJMcyg0gH-rceV5hQGQQ07ExdzzJLJ_Ee611YEnxp_3r1TvE3BeLuB2ZWP_oLwOH3e27nRKj9O6C2rZ_dv2btjYKb-mbUFpBVO31scs83TvI0u_wLzC6NEQc_odgGgmh5yUIkbILKVc5e1OfR7QI2tj91clvtKXU258rwoT6xIuHYB2RsUGYw_i6HiCkUbUwesSW2QEnHdw9_nEcJ"/>
<span class="text-sm font-bold text-gray-400 group-hover:text-white font-manrope">Apple</span>
</button>
</div>
<p class="text-center text-xs text-gray-500 font-medium font-manrope">
                        Already have an account? 
                        <a class="text-[var(--neon-cyan)] font-bold ml-1 hover:underline" href="#">Sign In</a>
</p>
</form>
</div>
</div>
</div>

</body></html>
