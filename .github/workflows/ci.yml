name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test-build:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Frontend
      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate required env vars
        run: |
          # CI uses dummy values — validates the app starts without crashing
          echo "VITE_SUPABASE_URL=https://ci-placeholder.supabase.co" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=ci-placeholder-key" >> $GITHUB_ENV
          echo "VITE_GEMINI_API_KEY=ci-placeholder-key" >> $GITHUB_ENV

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-key
          VITE_GEMINI_API_KEY: ci-placeholder-key

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: npm run dev &
        env:
          CI: true
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-key
          VITE_GEMINI_API_KEY: ci-placeholder-key

      - name: Wait for dev server
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3000 >/dev/null; then
              echo "dev server ready"
              exit 0
            fi
            sleep 1
          done
          echo "dev server failed to start"
          exit 1

      - name: Run smoke tests
        run: npm run test:smoke
